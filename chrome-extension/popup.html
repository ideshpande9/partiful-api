<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    #status {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      min-height: 18px;
    }
    #status.error { color: #e53e3e; }
    #status.done { color: #38a169; }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #7c3aed;
      color: #fff;
      transition: background 0.15s;
    }
    button:hover { background: #6d28d9; }
    button:disabled {
      background: #d4d4d8;
      cursor: not-allowed;
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Partiful Guest Export</h1>
  <div id="status">Ready</div>
  <button id="exportBtn">Export Guests to CSV</button>
  <div class="hint">Navigate to a partiful.com/e/... page and click export. The CSV will download in the background.</div>
  <script src="popup.js"></script>
</body>
</html>
